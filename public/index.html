<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CariWA</title>

<style>
body{
    background:#0f0f0f;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.box{
    background:#1a1a1a;
    padding:30px;
    border-radius:20px;
    width:320px;
    text-align:center;
}

h1{
    margin-top:0;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:15px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:15px;
    background:#25D366;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.stock{
    margin-top:15px;
    color:#aaa;
}
</style>

</head>
<body>

<div class="box">

<h1>CariWA</h1>

<input type="number" id="jumlah" placeholder="Jumlah nomor">

<button onclick="ambilNomor()">
Ambil Nomor
</button>

<div class="stock">
Stock:
<span id="stock">0</span>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
